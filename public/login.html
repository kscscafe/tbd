<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TBD - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-md bg-white rounded-lg shadow p-8">
    <h1 class="text-3xl font-bold text-center mb-1">TBD</h1>
    <p class="text-sm text-gray-600 text-center mb-6">断片を投げ込めば、AI が整理して仕上げる</p>

    <div class="flex border-b mb-4">
      <button id="tab-login" class="flex-1 py-2 border-b-2 border-blue-500 font-bold">ログイン</button>
      <button id="tab-signup" class="flex-1 py-2 border-b-2 border-transparent text-gray-500">新規登録</button>
    </div>

    <form id="form" class="space-y-3">
      <div id="display-name-row" class="hidden">
        <label class="block text-sm text-gray-700 mb-1">表示名（任意）</label>
        <input type="text" id="display-name" class="w-full border rounded px-3 py-2" />
      </div>
      <div>
        <label class="block text-sm text-gray-700 mb-1">メールアドレス</label>
        <input type="email" id="email" required class="w-full border rounded px-3 py-2" />
      </div>
      <div>
        <label class="block text-sm text-gray-700 mb-1">パスワード（8文字以上）</label>
        <input type="password" id="password" required minlength="8" class="w-full border rounded px-3 py-2" />
      </div>
      <button type="submit" id="submit"
        class="w-full bg-blue-500 text-white py-2 rounded font-bold hover:bg-blue-600 disabled:bg-gray-400">
        ログイン
      </button>
      <p id="error" class="text-red-500 text-sm hidden"></p>
    </form>
  </div>

  <script>
    let mode = 'login';
    const tabLogin = document.getElementById('tab-login');
    const tabSignup = document.getElementById('tab-signup');
    const displayNameRow = document.getElementById('display-name-row');
    const submitBtn = document.getElementById('submit');
    const form = document.getElementById('form');
    const errorEl = document.getElementById('error');

    function setMode(m) {
      mode = m;
      const isLogin = m === 'login';
      tabLogin.classList.toggle('border-blue-500', isLogin);
      tabLogin.classList.toggle('border-transparent', !isLogin);
      tabLogin.classList.toggle('font-bold', isLogin);
      tabLogin.classList.toggle('text-gray-500', !isLogin);
      tabSignup.classList.toggle('border-blue-500', !isLogin);
      tabSignup.classList.toggle('border-transparent', isLogin);
      tabSignup.classList.toggle('font-bold', !isLogin);
      tabSignup.classList.toggle('text-gray-500', isLogin);
      displayNameRow.classList.toggle('hidden', isLogin);
      submitBtn.textContent = isLogin ? 'ログイン' : '新規登録';
      errorEl.classList.add('hidden');
    }

    tabLogin.addEventListener('click', () => setMode('login'));
    tabSignup.addEventListener('click', () => setMode('signup'));

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.classList.add('hidden');
      submitBtn.disabled = true;
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const display_name = document.getElementById('display-name').value.trim();

      try {
        const res = await fetch(`/api/auth?action=${mode}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email, password,
            display_name: display_name || undefined,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed');
        localStorage.setItem('tbd_token', data.token);
        localStorage.setItem('tbd_user', JSON.stringify(data.user));
        location.href = '/';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.remove('hidden');
      } finally {
        submitBtn.disabled = false;
      }
    });

    // 既ログインなら本体へ
    if (localStorage.getItem('tbd_token')) {
      fetch('/api/auth', {
        headers: { 'X-Session-Token': localStorage.getItem('tbd_token') },
      }).then(r => { if (r.ok) location.href = '/'; });
    }
  </script>
</body>
</html>
